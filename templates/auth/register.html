<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ro'yxatdan o'tish | Falcon Store</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .reg-card {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #e1e8ef;
            position: relative;
        }

        /* Tepasidagi chiroyli dumaloq ikonka */
        .reg-icon {
            width: 80px;
            height: 80px;
            background: #2c7be5;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: -90px auto 20px;
            box-shadow: 0 10px 20px rgba(44, 123, 229, 0.3);
            border: 5px solid #f0f4f8;
        }

        .brand-name {
            color: #2c7be5;
            font-weight: 800;
            text-align: center;
            display: block;
            text-decoration: none;
            font-size: 22px;
            margin-bottom: 5px;
        }

        h3 { font-weight: 700; text-align: center; color: #12263f; margin-bottom: 30px; }

        .form-label { font-size: 13px; font-weight: 600; color: #5e6e82; margin-bottom: 8px; }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #d8e2ef;
            background-color: #fdfdff;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #2c7be5;
            box-shadow: 0 0 0 4px rgba(44, 123, 229, 0.1);
            background-color: #fff;
        }

        .btn-submit {
            background: #2c7be5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #1a5abf; transform: translateY(-2px); }
        .btn-submit:disabled { background: #9da9bb; transform: none; }

        /* Parol tekshiruvi vizual holati */
        .is-invalid-custom { border-color: #e63757 !important; }
        .is-valid-custom { border-color: #00d27a !important; }

        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #748194; }
        .login-link a { color: #2c7be5; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="reg-icon">
        <i class="fas fa-user-plus"></i>
    </div>

    <a href="/" class="brand-name">Falcon Store</a>
    <h3>Ro'yxatdan o'tish</h3>

    <form method="POST" id="regForm">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Ismingiz</label>
                <input type="text" name="first_name" class="form-control" placeholder="Ali" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Familiyangiz</label>
                <input type="text" name="last_name" class="form-control" placeholder="Valiyev" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email manzil</label>
            <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Parol</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="********" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Parolni tasdiqlash</label>
                <input type="password" name="password_confirm" id="confirm_password" class="form-control" placeholder="********" required>
            </div>
        </div>

        <div id="msg" class="small text-center mt-2 fw-bold" style="display: none;"></div>

        <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="terms" required>
            <label class="form-check-label small text-muted" for="terms">
                Men barcha shartlarga roziman
            </label>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit shadow">Hisob yaratish</button>
    </form>

    <div class="login-link">
        Profilingiz bormi? <a href="{% url 'login' %}">Kirish</a>
    </div>
</div>

<script>
    const pass = document.getElementById('password');
    const conf = document.getElementById('confirm_password');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    function check() {
        if (conf.value.length > 0) {
            msg.style.display = 'block';
            if (pass.value === conf.value) {
                msg.textContent = "✓ Parollar mos keldi";
                msg.style.color = "#00d27a";
                conf.classList.remove('is-invalid-custom');
                conf.classList.add('is-valid-custom');
                btn.disabled = false;
            } else {
                msg.textContent = "✕ Parollar mos kelmadi";
                msg.style.color = "#e63757";
                conf.classList.remove('is-valid-custom');
                conf.classList.add('is-invalid-custom');
                btn.disabled = true;
            }
        } else {
            msg.style.display = 'none';
            conf.classList.remove('is-invalid-custom', 'is-valid-custom');
        }
    }

    pass.addEventListener('keyup', check);
    conf.addEventListener('keyup', check);
</script>

</body>
</html>
